spring.application.name=Hostel-Management-System

spring.profiles.active=local

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3308/hotel_management_system
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT ← add these 3 lines
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# OAuth2 GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}


# OAuth2 Success redirect
app.oauth2.redirect-uri=http://localhost:4200/oauth2/

# Room image storage
app.upload.dir=uploads/room-images

logging.level.org.springframework.security=DEBUG

server.error.include-message=always
server.error.include-stacktrace=always